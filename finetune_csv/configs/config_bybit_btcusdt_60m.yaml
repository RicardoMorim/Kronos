# Auto-generated config for Kronos fine-tuning on Bybit data
# Generated by finetune_csv/prepare_bybit_datasets.py

data:
  data_path: "finetune_csv/data/bybit/bybit_BTCUSDT_60m.csv"
  lookback_window: 512
  predict_window: 48
  max_context: 512
  clip: 5.0
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

training:
  tokenizer_epochs: 20
  basemodel_epochs: 10
  batch_size: 32
  log_interval: 50
  num_workers: 4
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.00004

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.15

  # Early stopping
  early_stopping_min_delta: 0.001
  tokenizer_early_stopping_patience: 5
  basemodel_early_stopping_patience: 5

  accumulation_steps: 1

model_paths:
  pretrained_tokenizer: "NeoQuasar/Kronos-Tokenizer-base"
  pretrained_predictor: "NeoQuasar/Kronos-small"

  exp_name: "bybit_btcusdt_60m"
  base_path: "finetune_csv/finetuned"

  base_save_path: ""
  finetuned_tokenizer: ""

  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_bybit_finetune"
  description: "Bybit BTCUSDT interval=60"
  use_comet: false

  train_tokenizer: true
  train_basemodel: true

  skip_existing: false

device:
  use_cuda: true
  device_id: 0
